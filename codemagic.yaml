workflows:
  android_aab:
    name: Android AAB (Release)
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Pub get
        script: |
          flutter --version
          flutter pub get

      - name: Build AAB
        script: |
          flutter clean
          flutter build appbundle --release

      - name: Show outputs
        script: |
          echo "AAB files:"
          find build -maxdepth 8 -type f -name "*.aab" -print || true
          echo "Outputs folder:"
          ls -R build/app/outputs || true

    artifacts:
      - build/app/outputs/bundle/release/*.aab

  ios_ipa:
    name: iOS IPA (Release)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Pub get
        script: |
          flutter --version
          flutter pub get

      - name: Build IPA
        script: |
          flutter clean
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
